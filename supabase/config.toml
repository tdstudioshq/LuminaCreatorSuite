# CABANA — local Supabase configuration.
# Supports `supabase start` / `supabase db reset` on a Docker-enabled host.
# project_id links this workspace to the remote project for `supabase link`.
project_id = "dwnricswfskypqqfknnh"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# Match the production Postgres major version when known; 15 is broadly
# compatible with the baseline SQL (PG13+ features only).
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[storage]
enabled = true

[auth]
enabled = true
# Local dev serves on :8080 (Vite). site_url is GoTrue's fallback/redirect base,
# and every redirect target must be allow-listed here or GoTrue silently rewrites
# it back to site_url — which pointed reset/confirmation links at a dead :3000 and
# burned the one-time token. App code stays origin-relative (window.location.origin),
# so production is governed by the cloud project's own Auth redirect allow-list, not
# this local-only file.
site_url = "http://localhost:8080"
additional_redirect_urls = [
  "http://localhost:8080",
  "http://127.0.0.1:8080",
]
jwt_expiry = 3600
enable_signup = true

# Local only: skip email confirmation so signup provisioning (the
# handle_new_user trigger) can be smoke-tested end to end.
[auth.email]
enable_confirmations = false
