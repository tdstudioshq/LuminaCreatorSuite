name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint, typecheck, unit tests, and production build.
  verify:
    name: Verify (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  # Validate the EXACT dependency tree that Vercel ships — pnpm-lock.yaml — so CI
  # can never go green on a tree that differs from production (H-13). The `verify`
  # job above installs/tests/builds the bun.lock (dev/CI) tree; this one installs
  # the frozen pnpm (prod) lockfile and typechecks + builds it. `--frozen-lockfile`
  # also fails if pnpm-lock.yaml has drifted from package.json, so the two
  # lockfiles can't silently diverge from the manifest.
  verify-prod-deps:
    name: Verify prod deps (pnpm frozen · typecheck · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: pnpm

      - name: Install production dependency tree (frozen)
        run: pnpm install --frozen-lockfile

      - name: Typecheck (prod tree)
        run: pnpm exec tsc --noEmit

      - name: Build (prod tree)
        run: pnpm run build

  # Prove the baseline migration + seed rebuild a database from zero.
  # GitHub-hosted ubuntu runners include Docker and psql, so the local
  # Supabase stack and smoke checks run here even though they cannot in the
  # offline dev sandbox.
  db-validate:
    name: Database baseline (rebuild from zero)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      - name: Start local Supabase
        run: supabase start

      - name: Rebuild from zero (baseline migration + seed)
        run: supabase db reset

      - name: Schema / seed smoke checks
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/smoke.sql

      - name: Behavioral checks (account-type trigger + member RLS)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/member_accounts.sql

      - name: Behavioral checks (follows + blocks + safe public views)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/social_relationships.sql

      - name: Behavioral checks (posts + feed RPCs + media privacy)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/posts_feed.sql

      - name: Behavioral checks (comments + likes + saves)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/engagement.sql

      - name: Behavioral checks (creator subscriptions + entitlement)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/creator_subscriptions.sql

      - name: Behavioral checks (messaging + RLS + unread)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/messaging.sql

      - name: Behavioral checks (monetization ledger + payouts + RLS)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/monetization_ledger.sql

      - name: Behavioral checks (notifications + activity + outbox + RLS)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/notifications.sql

      - name: Behavioral checks (moderation reports + audit + RLS)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/admin_moderation.sql

      - name: Behavioral checks (admin payout management + audit + RLS)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/admin_payouts.sql

      - name: Behavioral checks (notification engine + retry + dead-letter + RLS)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/notification_engine.sql

      - name: Behavioral checks (creator content analytics RPC + RLS)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/creator_analytics.sql

      - name: Behavioral checks (post_media service-role grant)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/post_media_service_grant.sql

      - name: Behavioral checks (user_roles admin policy — self-read / admin / anon)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/user_roles_policy.sql

      - name: Behavioral checks (profile customization + profiles SELECT grant)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/profile_customization.sql

      - name: Behavioral checks (high-severity QA fixes — post_count + purchase/payout locks)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/high_qa_fixes.sql

      - name: Behavioral checks (audience insights RPC — counts + supporters + RLS)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/audience_insights.sql

      - name: Behavioral checks (creator_profiles anon column grant — user_id leak fix)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/creator_profiles_anon_grant.sql

      - name: Behavioral checks (post_media ownership — cross-post injection fix)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/post_media_ownership.sql

      - name: Behavioral checks (recalc_creator_balance internal-only — cross-user write fix)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/recalc_creator_balance_grant.sql

      - name: Behavioral checks (analytics_events hardening — event_type/payload/index)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/analytics_events_hardening.sql

      - name: Behavioral checks (stream_videos ownership + lifecycle + post_media linkage)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/stream_videos.sql

      - name: Behavioral checks (creator-page visibility — draft/published/archived + link inheritance)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/creator_page_visibility.sql

      - name: Stop Supabase
        if: always()
        run: supabase stop || true
